<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CV Tour — Inscription</title>
<meta http-equiv="refresh" content="1; url=https://relaction.notion.site/e96f69da29f849879c27a3f2d512de3d?v=390032ba7cb481288c69000c981d72bf&source=copy_link" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #0b1830 0%, #122344 55%, #16294a 100%);
    color: #ffffff;
    text-align: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    width: 480px; height: 480px;
    top: -140px; right: -120px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff7a50 0%, rgba(255,122,80,0) 70%);
    opacity: 0.35;
    pointer-events: none;
  }
  .box { position: relative; z-index: 1; max-width: 420px; }
  .logo-badge {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff7a50, #ff9d6c);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 22px; color: #0b1830;
    margin: 0 auto 24px;
  }
  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 30px;
    margin-bottom: 12px;
  }
  h1 span { color: #ff8a63; }
  p {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #ff7a50;
    border-radius: 50%;
    margin: 0 auto 28px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff7a50, #ff5c30);
    color: #fff;
    text-decoration: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 28px;
    border-radius: 14px;
  }
  .fallback-note {
    margin-top: 18px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="box">
    <div class="logo-badge">CV</div>
    <div class="spinner"></div>
    <h1>Direction le <span>CV Tour</span></h1>
    <p>Tu vas être redirigé(e) vers le formulaire d'inscription dans un instant...</p>
    <a class="btn" href="https://relaction.notion.site/e96f69da29f849879c27a3f2d512de3d?v=390032ba7cb481288c69000c981d72bf&source=copy_link">Accéder au formulaire</a>
    <div class="fallback-note">Rien ne se passe ? Clique sur le bouton ci-dessus.</div>
  </div>

  <script>
    window.location.replace("https://relaction.notion.site/e96f69da29f849879c27a3f2d512de3d?v=390032ba7cb481288c69000c981d72bf&source=copy_link");
  </script>
</body>
</html>
